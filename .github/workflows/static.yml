name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          headers: |
            /*
              Cache-Control: public, max-age=31536000, immutable
              Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; media-src 'self'; font-src 'self'; connect-src 'self'; object-src 'none'; frame-src 'self'; worker-src 'self'; manifest-src 'self'
            /*.html
              Cache-Control: public, max-age=0, must-revalidate
            /*.svg
              Content-Type: image/svg+xml
              Cache-Control: public, max-age=31536000, immutable
            /*.png
              Cache-Control: public, max-age=31536000, immutable
            /*.jpg
              Cache-Control: public, max-age=31536000, immutable
            /*.webp
              Cache-Control: public, max-age=31536000, immutable
            /*.woff2
              Cache-Control: public, max-age=31536000, immutable

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4